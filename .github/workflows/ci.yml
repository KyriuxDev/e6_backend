name: CI

on:
  push:
    branches: [master, feat/ci-cd]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Build · Migrate · Test
    runs-on: ubuntu-latest

    # ── Base de datos para los tests de integración ────────────────────────
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       irsu_test
          POSTGRES_USER:     irsu_user
          POSTGRES_PASSWORD: irsu_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U irsu_user"
          --health-interval 10s
          --health-timeout  5s
          --health-retries  5

    # ── Variables de entorno para el pipeline ─────────────────────────────
    env:
      DATABASE_URL:             postgresql://irsu_user:irsu_pass@localhost:5432/irsu_test
      JWT_SECRET:               ci_secret_only_not_for_production_1234567890ab
      JWT_EXPIRES_IN:           1d
      PORT:                     3000
      NODE_ENV:                 test
      APP_NAME:                 API IRSU CI
      APP_DESCRIPTION:          Pipeline de integración continua
      APP_VERSION:              1.0.0
      LIMITE_REPORTES_ANONIMO:  3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Run tests
        run: npm test
