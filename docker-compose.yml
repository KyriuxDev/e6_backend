services:
  # ── Base de datos ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: irsu_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       irsu_db
      POSTGRES_USER:     irsu_user
      POSTGRES_PASSWORD: irsu_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U irsu_user -d irsu_db"]
      interval: 5s
      timeout:  5s
      retries:  10

  # ── Backend ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      target:  production
    container_name: irsu_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:             postgresql://irsu_user:irsu_pass@db:5432/irsu_db
      JWT_SECRET:               oaxaca.21
      JWT_EXPIRES_IN:           30m
      PORT:                     3000
      NODE_ENV:                 production
      APP_NAME:                 API IRSU
      APP_DESCRIPTION:          Sistema de Reportes Ciudadanos Geolocalizados
      APP_VERSION:              1.0.0
      LIMITE_REPORTES_ANONIMO:  3
      # Cambiar a "true" SOLO la primera vez para cargar datos geográficos (~5-10 min)
      SEED_DATA:                "false"
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
      # Datos geográficos para el seed (solo lectura)
      - ./prisma/data:/app/prisma/data:ro

volumes:
  postgres_data:
  uploads_data:
